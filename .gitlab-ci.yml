test:e2e:
  stage: test
  image: node:24
  services:
    - name: postgres:17-alpine
      alias: postgres
  variables:
    # Picked up automatically by the postgres service image
    POSTGRES_DB: imgcompare
    POSTGRES_USER: imgcompare
    POSTGRES_PASSWORD: postgres
    # Used by the server and drizzle migrations
    DATABASE_URL: postgresql://imgcompare:postgres@postgres:5432/imgcompare
    # Set MASTER_KEY as a masked CI/CD variable in GitLab (Settings → CI/CD → Variables)
    MASTER_KEY: $MASTER_KEY
    # Unset client credentials so the CLI uses the token written by `init` instead
    IMGCOMPARE_CLIENT_ID: ""
    IMGCOMPARE_CLIENT_SECRET: ""
    # Store playwright browsers inside the project dir so GitLab cache works
    PLAYWRIGHT_BROWSERS_PATH: $CI_PROJECT_DIR/.playwright-browsers
  cache:
    key: playwright-chromium-1.59
    paths:
      - .playwright-browsers/
  before_script:
    - corepack enable
    - pnpm install
    # Install Chromium browser binaries (cached between runs)
    - npx playwright install --with-deps chromium
    # Wait for postgres to be ready, then run migrations
    - npx wait-on tcp:postgres:5432 --timeout 30000
    - cd packages/server && pnpm run db:migrate && cd ../..
    # Start server in background and wait for it to be healthy
    - (cd packages/server && pnpm run start) &
    - npx wait-on http://localhost:8070/health --timeout 30000
    # Bootstrap project and write config.json into demo-app
    - rm demo-app/config.json
    - cd demo-app && node ../packages/cli/src/cli.ts init --server-url http://localhost:8070 --email test@example.com --password secret --project-name ci_testing123 && cd ..
  script:
    - cd demo-app && pnpm run test
  artifacts:
    when: always
    paths:
      - demo-app/playwright-report/
      - demo-app/test-results/
    expire_in: 7 days

test:e2e:prod:
  stage: test
  image: node:24
  variables:
    PLAYWRIGHT_BROWSERS_PATH: $CI_PROJECT_DIR/.playwright-browsers
  cache:
    key: playwright-chromium-1.59
    paths:
      - .playwright-browsers/
  before_script:
    - corepack enable
    - pnpm install
    - npx playwright install --with-deps chromium
    - |
      cat > demo-app/config.json <<'EOF'
      {
        "projectId": "b242a93a-ddf2-4560-9af6-df276cfa0c8a",
        "serverUrl": "https://imgcompare.lachlan-miller.me"
      }
      EOF
  script:
    - cd demo-app && pnpm run test
  artifacts:
    when: always
    paths:
      - demo-app/playwright-report/
      - demo-app/test-results/
    expire_in: 7 days
